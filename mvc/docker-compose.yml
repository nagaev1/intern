version: '3'

services:
  php:
    build: 
      context: dockerfiles
      dockerfile: ./php.Dockerfile
    volumes:
      - ./:/app
    user: '1000:1000'
    ports:
      - 8000:8000
    command: php -S 0.0.0.0:8000 -t /app
  
  composer:
    build: 
      context: dockerfiles
      dockerfile: ./composer.Dockerfile
    volumes:
      - ./:/app
    command: install